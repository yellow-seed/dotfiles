# NOTE:
# CI and helper script `scripts/run-checks.sh` run `qlty check --all`.
# Keep this plugin list as the single source of truth for checks,
# including shfmt/actionlint for shell formatting and GitHub Actions linting.

config_version = "0"

# qlty is introduced by template sync, but this dotfiles repo still has
# legacy OS-specific setup assets whose formatting is validated by the
# existing BATS/compose lint paths. Keep qlty focused on the template-managed
# toolchain until those areas are migrated deliberately.
exclude_patterns = [
  ".githooks/**",
  ".github/copilot-instructions.md",
  ".github/scripts/setup-*.sh",
  "docs/GITHUB_RULESET_SETUP.md",
  "home/**",
  "install/**",
  "setup.sh",
]

[[source]]
name = "default"
default = true

[[plugin]]
name = "shellcheck"
version = "0.10.0"

[[plugin]]
name = "shfmt"
version = "3.8.0"

[[plugin]]
name = "actionlint"

[[plugin]]
name = "prettier"
version = "3.6.2"

[[exclude]]
plugins = ["prettier"]
file_patterns = [".github/skills/**", ".claude/skills/**", ".codex/skills/**", ".agents/skills/**"]
