name: CI - macOS

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  test-and-coverage:
    name: macOS Tests with Coverage
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install kcov
        run: brew install kcov

      - name: Install Bats and Bash
        run: brew install bats-core bash

      - name: Run Bats tests
        run: |
          # Run the full test suite first so pass/fail is decided before coverage collection.
          bats install/macos/ install/common/ tests/files/

      - name: Collect script coverage
        run: |
          # TODO: Collect script coverage is intentionally skipped for now.
          # The step remains so the workflow structure stays visible, but the
          # current kcov-based approach takes too long and should be redesigned
          # in a separate issue before re-enabling coverage collection here.
          echo "Skipping script coverage collection for now; revisit in a separate issue."

      - name: Upload coverage to Codecov
        if: ${{ hashFiles('coverage/cobertura.xml') != '' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/cobertura.xml
          flags: macos
          name: coverage-macos
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  shellcheck:
    name: ShellCheck and shfmt
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck and shfmt
        uses: ./.github/actions/shellcheck-shfmt
        with:
          os: macos
