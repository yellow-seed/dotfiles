name: CI - macOS

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  test-and-coverage:
    name: macOS Tests with Coverage
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install kcov
        run: brew install kcov

      - name: Install Bats and Bash
        run: brew install bats-core bash

      - name: Run Bats tests
        run: |
          export DRY_RUN=true

          # Run the full test suite first so pass/fail is decided before coverage collection.
          bats install/macos/ install/common/ tests/files/

      - name: Collect script coverage
        run: |
          export DRY_RUN=true

          # Measure script coverage directly with Homebrew bash to avoid kcov issues on macOS runners.
          brew_prefix="$(brew --prefix)"
          BASH_BIN="${brew_prefix}/bin/bash"
          test -x "${BASH_BIN}"

          mkdir -p coverage/raw coverage/tmp
          kcov --exclude-pattern=/usr,/opt/homebrew,/System coverage/raw/01-brew "${BASH_BIN}" install/macos/01-brew.sh
          kcov --exclude-pattern=/usr,/opt/homebrew,/System coverage/raw/02-brew-packages "${BASH_BIN}" install/macos/02-brew-packages.sh
          kcov --exclude-pattern=/usr,/opt/homebrew,/System coverage/raw/03-profile "${BASH_BIN}" install/macos/03-profile.sh
          kcov --exclude-pattern=/usr,/opt/homebrew,/System coverage/raw/setup "${BASH_BIN}" install/macos/setup.sh
          kcov --exclude-pattern=/usr,/opt/homebrew,/System coverage/raw/brew-dump-explicit "${BASH_BIN}" install/macos/brew-dump-explicit.sh coverage/tmp/Brewfile

          # Merge coverage reports and ensure the upload artifact exists.
          kcov --merge coverage coverage/raw/01-brew coverage/raw/02-brew-packages coverage/raw/03-profile coverage/raw/setup coverage/raw/brew-dump-explicit
          test -f coverage/cobertura.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/cobertura.xml
          flags: macos
          name: coverage-macos
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  shellcheck:
    name: ShellCheck and shfmt
    runs-on: macos-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck and shfmt
        uses: ./.github/actions/shellcheck-shfmt
        with:
          os: macos
