name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  Lint:
    name: qlty Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install qlty
        uses: qltysh/qlty-action/install@v1

      - name: Run checks
        run: scripts/run-checks.sh

  Test:
    name: bats Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          bash scripts/install-tools.sh

      - name: Run bats tests
        run: bats tests/*.bats tests/files/

  NixLint:
    name: Nix Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check Nix format (nixfmt)
        run: nix run nixpkgs#nixfmt-rfc-style -- --check install/macos/nix/flake.nix install/macos/nix/darwin/default.nix

      - name: Lint Nix (statix)
        run: nix run nixpkgs#statix -- check --config install/macos/nix/statix.toml install/macos/nix

      - name: Check dead Nix code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail install/macos/nix/flake.nix install/macos/nix/darwin/default.nix
