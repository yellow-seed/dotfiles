name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      [
        main,
        feat/*,
        fix/*,
        docs/*,
        style/*,
        refactor/*,
        perf/*,
        test/*,
        chore/*,
        copilot/*,
        claude/*,
      ]

jobs:
  Lint:
    name: qlty Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install qlty
        uses: qltysh/qlty-action/install@v2

      - name: Run checks
        run: scripts/run-checks.sh

  Test:
    name: bats Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run bats tests
        uses: bats-core/bats-action@4.0.0
        with:
          bats-args: tests/*.bats tests/files/

  NixLint:
    name: NixLint (install/macos)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # ubuntu-latest is more cost-effective than macos-latest for Nix operations
    if: |
      github.event_name == 'pull_request' ||
      contains(toJSON(github.event.commits), 'install/macos/nix')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Check Nix format (nixfmt)
        run: nix run nixpkgs#nixfmt-rfc-style -- --check install/macos/nix/flake.nix install/macos/nix/darwin/default.nix

      - name: Lint Nix (statix)
        run: nix run nixpkgs#statix -- check --config install/macos/nix/statix.toml install/macos/nix

      - name: Check dead Nix code (deadnix)
        run: nix run nixpkgs#deadnix -- --fail install/macos/nix/flake.nix install/macos/nix/darwin/default.nix
